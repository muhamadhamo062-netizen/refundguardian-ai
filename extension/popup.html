<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RefundGuardian AI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #0a0b0d;
      color: #e4e4e7;
    }
    h1 { font-size: 15px; margin: 0 0 10px; font-weight: 600; }
    p { font-size: 12px; color: #a1a1aa; margin: 0 0 10px; line-height: 1.45; }
    label { display: block; font-size: 11px; color: #71717a; margin-bottom: 4px; }
    input, button {
      width: 100%;
      padding: 9px 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      border: 1px solid #27272a;
      background: #18181b;
      color: #e4e4e7;
      font-size: 12px;
    }
    button {
      background: #22c55e;
      color: #052e16;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #16a34a; }
    button:active { transform: scale(0.98); }
    .status { font-size: 11px; margin-top: 6px; min-height: 1.2em; }
    .status.ok { color: #22c55e; }
    .status.err { color: #f87171; }
  </style>
</head>
<body>
  <h1>RefundGuardian AI</h1>
  <p>Paste your token from the dashboard to link this extension to your account.</p>
  <label for="token">Access token</label>
  <input type="password" id="token" placeholder="Paste access token here" autocomplete="off" spellcheck="false">
  <button type="button" id="save">Save token</button>
  <div id="status" class="status" role="status"></div>
  <script src="popup.js"></script>
</body>
</html>
