<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RefundGuardian AI</title>
  <style>
    body { width: 320px; padding: 12px; font-family: system-ui, sans-serif; background: #0a0b0d; color: #e4e4e7; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    p { font-size: 12px; color: #71717a; margin: 0 0 8px; }
    input, button { width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #27272a; background: #18181b; color: #e4e4e7; box-sizing: border-box; }
    button { background: #22c55e; color: #0a0b0d; border: none; font-weight: 600; cursor: pointer; }
    button:hover { background: #16a34a; }
    .status { font-size: 11px; color: #22c55e; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>RefundGuardian AI</h1>
  <p>Paste your token from the dashboard to link this extension to your account.</p>
  <input type="password" id="token" placeholder="Paste access token here">
  <button id="save">Save token</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
