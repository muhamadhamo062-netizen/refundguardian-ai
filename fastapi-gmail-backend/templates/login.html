{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block nav %}
  <a href="/register">Create account</a>
{% endblock %}
{% block content %}
<section class="card">
  <h1>Sign in</h1>
  <p class="muted">Access your order dashboard and Gmail scan.</p>
  <form id="f-login" class="form">
    <label>Email<input type="email" name="email" autocomplete="username" required /></label>
    <label>Password<input type="password" name="password" autocomplete="current-password" required minlength="8" /></label>
    <button type="submit" class="btn primary">Sign in</button>
  </form>
  <p id="msg" class="msg" role="status"></p>
</section>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('f-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const msg = document.getElementById('msg');
  msg.textContent = '';
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({
      email: fd.get('email'),
      password: fd.get('password'),
    }),
  });
  if (res.ok) {
    window.location.href = '/dashboard';
    return;
  }
  const j = await res.json().catch(() => ({}));
  msg.textContent = j.detail || 'Login failed';
});
</script>
{% endblock %}
